<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aurhythm — 音乐播放器</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Stylesheet -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ========== 氛围背景 ========== -->
  <div class="bg-ambient">
    <div class="orb"></div>
    <div class="orb"></div>
    <div class="orb"></div>
  </div>
  <div class="grain-overlay"></div>

  <!-- ========== 提示 Toast ========== -->
  <div class="toast" id="toast"></div>

  <!-- ========== 主体容器 ========== -->
  <div class="app-container">

    <!-- 左侧：播放器主面板 -->
    <div class="player-main" id="playerMain">

      <!-- 专辑封面（黑胶唱片） -->
      <div class="art-container">
        <div class="art-wrapper" id="artWrapper">
          <div class="art-grooves"></div>
          <div class="art-disc" id="artDisc">
            <div class="placeholder-art">🎵</div>
          </div>
          <div class="art-center-dot"></div>
        </div>
      </div>

      <!-- 曲目信息 -->
      <div class="track-info">
        <div class="track-title" id="trackTitle">选择一首歌曲</div>
        <div class="track-artist" id="trackArtist">开始播放</div>
      </div>

      <!-- 进度条 -->
      <div class="progress-section">
        <div class="progress-bar-container" id="progressBar">
          <div class="progress-fill" id="progressFill" style="width:0%"></div>
        </div>
        <div class="time-display">
          <span id="currentTime">00:00</span>
          <span id="duration">00:00</span>
        </div>
      </div>

      <!-- 播放控件 -->
      <div class="controls-section">
        <button class="ctrl-btn btn-shuffle" id="btnShuffle" title="随机播放 (S)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/>
            <polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/>
            <line x1="4" y1="4" x2="9" y2="9"/>
          </svg>
        </button>

        <button class="ctrl-btn" id="btnPrev" title="上一首">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/>
          </svg>
        </button>

        <button class="btn-play" id="btnPlay" title="播放 / 暂停 (Space)">
          <svg viewBox="0 0 24 24" fill="currentColor" id="iconPlay">
            <path d="M8 5v14l11-7z"/>
          </svg>
          <svg viewBox="0 0 24 24" fill="currentColor" id="iconPause" style="display:none">
            <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
          </svg>
        </button>

        <button class="ctrl-btn" id="btnNext" title="下一首">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/>
          </svg>
        </button>

        <button class="ctrl-btn btn-repeat" id="btnRepeat" title="循环模式 (R)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 014-4h14"/>
            <polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 01-4 4H3"/>
          </svg>
        </button>
      </div>

      <!-- 音量控制 -->
      <div class="volume-section">
        <span class="volume-icon" id="volumeIcon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            <path d="M19.07 4.93a10 10 0 010 14.14M15.54 8.46a5 5 0 010 7.07"/>
          </svg>
        </span>
        <div class="volume-slider-container" id="volumeSlider">
          <div class="volume-slider-fill" id="volumeFill" style="width:70%"></div>
        </div>
      </div>
    </div>

    <!-- 右侧：播放列表 -->
    <div class="playlist-panel">
      <div class="playlist-header">
        <h2>播放列表</h2>
        <div class="search-box">
          <span class="search-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
          </span>
          <input type="text" placeholder="搜索歌曲..." id="searchInput">
        </div>
      </div>

      <div class="playlist-list" id="playlistList">
        <!-- JS 动态渲染 -->
      </div>

      <div class="upload-zone">
        <label class="upload-area" for="fileUpload">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
          <div>拖拽或点击上传音乐文件</div>
          <input type="file" id="fileUpload" accept="audio/*" multiple>
        </label>
      </div>
    </div>
  </div>

  <!-- ========== 音频可视化 ========== -->
  <div class="visualizer" id="visualizer"></div>

  <!-- ========== 隐藏 Audio 元素 ========== -->
  <audio id="audioPlayer" preload="auto"></audio>

  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- ========== 脚本 ========== -->
  <script src="js/script.js"></script>
</body>
</html>
